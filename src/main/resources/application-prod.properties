spring.application.name=cms_web

# ===== Datasource (RDS MySQL) =====
# DB_URL 예시: jdbc:mysql://cmsweb-db.xxxxx.ap-northeast-2.rds.amazonaws.com:3306/cms_db?useSSL=true&allowPublicKeyRetrieval=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
# 스키마는 Flyway가 관리하므로 기본값은 validate(검증만). update로 강제하지 말 것.
# Flyway/Actuator 공통 설정은 application.properties 에 정의되어 prod에도 그대로 상속된다.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
# 32자 이상의 무작위 문자열. openssl rand -base64 48 로 생성 권장.
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-exp-min=${JWT_EXP_MIN:60}

# ===== File Upload =====
# 운영에서는 EBS 마운트 경로(예: /var/cmsweb/uploads) 사용
app.upload.dir=${UPLOAD_DIR:/var/cmsweb/uploads}
app.upload.public-base-url=${UPLOAD_PUBLIC_BASE_URL:/uploads}
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# ===== Admin Bootstrap =====
# 가입된 일반 사용자를 ADMIN으로 1회 승격. 운영 가동 후 비울 것.
app.admin.bootstrap-email=${ADMIN_BOOTSTRAP_EMAIL:}

# ===== CORS =====
# 콤마 구분. 예: https://example.com,https://www.example.com
# 도메인 없이 EC2 IP만 쓸 때는 비워두고 동일 출처(Nginx 리버스 프록시)로 처리.
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}

# ===== Logging =====
logging.level.root=INFO
logging.level.cms_back=INFO
logging.level.org.hibernate.SQL=WARN
logging.file.name=${LOG_FILE:/var/log/cmsweb/app.log}

# ===== Server =====
server.port=${SERVER_PORT:8080}
# 운영에서는 Nginx 뒤에 있으므로 forwarded 헤더 신뢰
server.forward-headers-strategy=framework
