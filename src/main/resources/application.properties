spring.application.name=cms_web

# ===== 로컬 개발용 DB =====
# docker-compose.dev.yml 의 로컬 MySQL 기준 더미값이다(운영 RDS 정보 아님).
#   docker compose -f docker-compose.dev.yml up -d   로 띄운다.
# 개인 환경값으로 덮어쓰려면 application-local.properties(=.gitignore 대상)를 만들고
#   ./gradlew bootRun --args='--spring.profiles.active=local' 로 실행한다.
spring.datasource.url=jdbc:mysql://localhost:3306/cms_db?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=localdev

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
# 스키마는 Flyway가 관리한다. JPA는 검증만(validate) 수행하고 직접 변경하지 않는다.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway (DB 마이그레이션)
# - baseline-on-migrate: 이미 테이블이 있는 기존 DB는 V1을 건너뛰고 version=1로 baseline 처리,
#   빈 DB는 V1부터 실행.
# - clean-disabled: 운영 DB 보호용으로 flyway:clean(전체 삭제) 영구 비활성화.
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.clean-disabled=true

# JWT
# 로컬 개발 전용 더미 시크릿. 운영에서는 절대 사용 금지(운영은 cmsweb.env 의 JWT_SECRET 주입).
# HS256 요건상 32바이트 이상이어야 한다.
app.jwt.secret=local-dev-dummy-secret-not-for-production-use-change-me
app.jwt.access-token-exp-min=60

# 파일 업로드 (관리자)
app.upload.dir=./uploads
app.upload.public-base-url=/uploads
spring.servlet.multipart.max-file-size=30MB
spring.servlet.multipart.max-request-size=30MB

# 부팅 시 지정 이메일을 ADMIN으로 승격(최초 1회용). 빈 값이면 비활성.
# 로컬에서 관리자 계정이 필요하면 application-local.properties 에 본인 이메일을 넣는다.
app.admin.bootstrap-email=

# MySQL Dialect 설정 (Spring Boot 3.x)
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Actuator: 헬스체크만 노출. show-details=never 로 외부엔 UP/DOWN status만 보인다.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
